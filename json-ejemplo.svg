  <text x="50" y="268" fill="#555" font-family="Courier New, monospace" font-size="13">9</text>
  <!-- JSON code -->
  <text x="75" y="108" fill="#ffd700" font-family="Courier New, monospace" font-size="14">{</text>
  <text x="95" y="128" fill="#ce9178" font-family="Courier New, monospace" font-size="14">"status"</text><text x="183" y="128" fill="#ccc" font-family="Courier New, monospace" font-size="14">:</text><text x="200" y="128" fill="#6a9955" font-family="Courier New, monospace" font-size="14">"200 OK"</text><text x="288" y="128" fill="#ccc" font-family="Courier New, monospace" font-size="14">,</text>
