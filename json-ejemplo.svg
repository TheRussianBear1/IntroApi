  <text x="120" y="168" fill="#ce9178" font-family="Courier New, monospace" font-size="14">"id"</text><text x="160" y="168" fill="#ccc" font-family="Courier New, monospace" font-size="14">:</text><text x="178" y="168" fill="#b5cea8" font-family="Courier New, monospace" font-size="14">1</text><text x="190" y="168" fill="#ccc" font-family="Courier New, monospace" font-size="14">,</text>
  <text x="120" y="188" fill="#ce9178" font-family="Courier New, monospace" font-size="14">"nombre"</text><text x="210" y="188" fill="#ccc" font-family="Courier New, monospace" font-size="14">:</text><text x="228" y="188" fill="#6a9955" font-family="Courier New, monospace" font-size="14">"Cristian Medina"</text><text x="400" y="188" fill="#ccc" font-family="Courier New, monospace" font-size="14">,</text>
  <text x="120" y="208" fill="#ce9178" font-family="Courier New, monospace" font-size="14">"curso"</text><text x="196" y="208" fill="#ccc" font-family="Courier New, monospace" font-size="14">:</text><text x="213" y="208" fill="#6a9955" font-family="Courier New, monospace" font-size="14">"Diseño Web 4to"</text><text x="383" y="208" fill="#ccc" font-family="Courier New, monospace" font-size="14">,</text>
  <text x="120" y="228" fill="#ce9178" font-family="Courier New, monospace" font-size="14">"activo"</text><text x="203" y="228" fill="#ccc" font-family="Courier New, monospace" font-size="14">:</text><text x="220" y="228" fill="#569cd6" font-family="Courier New, monospace" font-size="14">true</text>
  <text x="95" y="248" fill="#ffd700" font-family="Courier New, monospace" font-size="14">}</text>
  <text x="75" y="268" fill="#ffd700" font-family="Courier New, monospace" font-size="14">}</text>
