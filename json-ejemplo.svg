  <circle cx="72" cy="69" r="6" fill="#febc2e"/>
  <circle cx="92" cy="69" r="6" fill="#28c840"/>
  <text x="300" y="73" text-anchor="middle" fill="#888" font-family="Segoe UI, sans-serif" font-size="10">respuesta_api.json</text>
  <!-- Line numbers -->
  <text x="50" y="108" fill="#555" font-family="Courier New, monospace" font-size="13">1</text>
  <text x="50" y="128" fill="#555" font-family="Courier New, monospace" font-size="13">2</text>
  <text x="50" y="148" fill="#555" font-family="Courier New, monospace" font-size="13">3</text>
