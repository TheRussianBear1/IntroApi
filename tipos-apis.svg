<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#141e30"/>
      <stop offset="100%" style="stop-color:#243b55"/>
    </linearGradient>
  </defs>
  <rect width="600" height="340" rx="16" fill="url(#bg3)"/>
  <text x="300" y="38" text-anchor="middle" fill="#fff" font-family="Segoe UI, sans-serif" font-size="20" font-weight="bold">Tipos de APIs más utilizadas</text>
  <!-- REST -->
  <rect x="25" y="60" width="165" height="125" rx="12" fill="#1a1a2e" stroke="#6c63ff" stroke-width="2"/>
  <circle cx="107" cy="90" r="18" fill="#6c63ff" opacity="0.25"/>
  <text x="107" y="96" text-anchor="middle" fill="#6c63ff" font-family="Segoe UI, sans-serif" font-size="16" font-weight="bold">REST</text>
  <text x="107" y="120" text-anchor="middle" fill="#bbb" font-family="Segoe UI, sans-serif" font-size="10">Arquitectura basada</text>
  <text x="107" y="134" text-anchor="middle" fill="#bbb" font-family="Segoe UI, sans-serif" font-size="10">en recursos y URLs.</text>
  <text x="107" y="155" text-anchor="middle" fill="#6c63ff" font-family="Segoe UI, sans-serif" font-size="9">Usa JSON • HTTP</text>
  <rect x="55" y="165" width="105" height="8" rx="4" fill="#1a1a2e" stroke="#6c63ff" stroke-width="1"/>
  <rect x="55" y="165" width="95" height="8" rx="4" fill="#6c63ff" opacity="0.5"/>
  <text x="107" y="182" text-anchor="middle" fill="#6c63ff" font-family="Segoe UI, sans-serif" font-size="8">Popularidad: 90%</text>
  <!-- GraphQL -->
  <rect x="215" y="60" width="170" height="125" rx="12" fill="#1a1a2e" stroke="#e535ab" stroke-width="2"/>
  <circle cx="300" cy="90" r="18" fill="#e535ab" opacity="0.25"/>
  <text x="300" y="96" text-anchor="middle" fill="#e535ab" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold">GraphQL</text>
  <text x="300" y="120" text-anchor="middle" fill="#bbb" font-family="Segoe UI, sans-serif" font-size="10">Consultas flexibles,</text>
  <text x="300" y="134" text-anchor="middle" fill="#bbb" font-family="Segoe UI, sans-serif" font-size="10">pides solo lo que necesitas.</text>
  <text x="300" y="155" text-anchor="middle" fill="#e535ab" font-family="Segoe UI, sans-serif" font-size="9">Facebook • 2015</text>
  <rect x="248" y="165" width="105" height="8" rx="4" fill="#1a1a2e" stroke="#e535ab" stroke-width="1"/>
  <rect x="248" y="165" width="60" height="8" rx="4" fill="#e535ab" opacity="0.5"/>
  <text x="300" y="182" text-anchor="middle" fill="#e535ab" font-family="Segoe UI, sans-serif" font-size="8">Popularidad: 55%</text>
  <!-- SOAP -->
  <rect x="410" y="60" width="165" height="125" rx="12" fill="#1a1a2e" stroke="#ffc107" stroke-width="2"/>
  <circle cx="492" cy="90" r="18" fill="#ffc107" opacity="0.25"/>
  <text x="492" y="96" text-anchor="middle" fill="#ffc107" font-family="Segoe UI, sans-serif" font-size="16" font-weight="bold">SOAP</text>
  <text x="492" y="120" text-anchor="middle" fill="#bbb" font-family="Segoe UI, sans-serif" font-size="10">Protocolo robusto</text>
  <text x="492" y="134" text-anchor="middle" fill="#bbb" font-family="Segoe UI, sans-serif" font-size="10">para sistemas empresariales.</text>
  <text x="492" y="155" text-anchor="middle" fill="#ffc107" font-family="Segoe UI, sans-serif" font-size="9">Usa XML • WSDL</text>
  <rect x="440" y="165" width="105" height="8" rx="4" fill="#1a1a2e" stroke="#ffc107" stroke-width="1"/>
  <rect x="440" y="165" width="30" height="8" rx="4" fill="#ffc107" opacity="0.5"/>
  <text x="492" y="182" text-anchor="middle" fill="#ffc107" font-family="Segoe UI, sans-serif" font-size="8">Popularidad: 25%</text>
  <!-- Ejemplo práctico -->
  <rect x="25" y="205" width="550" height="120" rx="12" fill="#0d0d1a" stroke="#333" stroke-width="1"/>
  <text x="300" y="230" text-anchor="middle" fill="#fff" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold">Ejemplos de APIs públicas populares</text>
  <circle cx="80" cy="270" r="4" fill="#6c63ff"/>
  <text x="95" y="274" fill="#ccc" font-family="Segoe UI, sans-serif" font-size="11">OpenWeatherMap — Clima en tiempo real</text>
  <circle cx="80" cy="294" r="4" fill="#e535ab"/>
  <text x="95" y="298" fill="#ccc" font-family="Segoe UI, sans-serif" font-size="11">PokéAPI — Datos de Pokémon</text>
  <circle cx="340" cy="270" r="4" fill="#ffc107"/>
  <text x="355" y="274" fill="#ccc" font-family="Segoe UI, sans-serif" font-size="11">NASA API — Imágenes del espacio</text>
  <circle cx="340" cy="294" r="4" fill="#00fff5"/>
  <text x="355" y="298" fill="#ccc" font-family="Segoe UI, sans-serif" font-size="11">JSONPlaceholder — Datos de prueba</text>
</svg>
